name: release-channel

# Reusable, single-channel release pipeline (resolve -> build -> publish) for ONE
# channel (stable | legacy). Both channels publish into the SAME rolling release
# (tag `php`); the caller (release.yml) invokes this once per channel and
# serializes them so the shared-release prune step can't race (§6, §9).
on:
  workflow_call:
    inputs:
      channel:
        description: "Channel to build: stable (>= 8.2) or legacy (7.4/8.0/8.1)."
        required: true
        type: string
      only_minor:
        description: "Restrict to a single minor. Blank = all minors in the channel."
        required: false
        type: string
        default: ""
      only_target:
        description: "Restrict to one '<os>-<arch>' (e.g. macos-aarch64). Blank = all targets."
        required: false
        type: string
        default: ""
      force:
        description: "Rebuild even if the patch is unchanged (bumps revision -N)."
        required: false
        type: boolean
        default: false

permissions:
  contents: write               # create/update the rolling release + assets

jobs:
  # ---------------------------------------------------------------------------
  resolve:
    runs-on: ubuntu-latest
    env:
      CHANNEL: ${{ inputs.channel }}
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      count: ${{ steps.resolve.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP (tooling)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Pre-flight — signing key present (fail fast, before any build)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PUBLIC_KEY: ${{ vars.MINISIGN_PUBLIC_KEY }}
        run: |
          # Validate the signing config up front so a missing secret fails in
          # seconds instead of after hours of paid macOS/Linux build time.
          [ -n "$MINISIGN_SECRET_KEY" ] || { echo "FATAL: secret MINISIGN_SECRET_KEY is not set — run scripts/keygen.sh and configure it."; exit 1; }
          [ -n "$MINISIGN_PUBLIC_KEY" ] || { echo "FATAL: variable MINISIGN_PUBLIC_KEY is not set — the sign self-verify and §10.8 sanity-check require it."; exit 1; }
          echo "signing config present."
      - name: Fetch previously-published manifest (§10.1)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source scripts/config.sh
          # Distinguish three cases without ever defaulting a *fetch error* to
          # empty (which would make resolve treat every target as new and RESET
          # every revision to 1, wiping the auto-heal history, §7):
          #   1. no rolling release at all      -> genuine first run, empty.
          #   2. release exists but THIS channel's manifest is absent from its
          #      asset list                      -> first run for this channel, empty.
          #   3. manifest present                -> download it (fatal on failure).
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "No rolling '$RELEASE_TAG' release yet — first run, empty manifest."
            echo '{}' > old-manifest.json
          else
            assets="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')" \
              || { echo "FATAL: could not list release assets — aborting (a default-empty here would reset all revisions)."; exit 1; }
            if ! grep -qxF "$MANIFEST_NAME" <<<"$assets"; then
              echo "Release exists but $MANIFEST_NAME absent — first run for channel '$CHANNEL', empty manifest."
              echo '{}' > old-manifest.json
            else
              gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
                --pattern "$MANIFEST_NAME" --output old-manifest.json --clobber \
                || { echo "FATAL: $MANIFEST_NAME listed but could not be downloaded — aborting (a default-empty here would reset all revisions)."; exit 1; }
              n="$(jq -r '(.builds // []) | length' old-manifest.json 2>/dev/null || echo x)"
              case "$n" in
                ''|x|0) echo "FATAL: fetched $MANIFEST_NAME is invalid or has no builds[] — refusing (would reset revisions)."; exit 1 ;;
                *) echo "Previous manifest OK ($n builds)." ;;
              esac
            fi
          fi
      - name: Resolve build matrix (§7 revision algorithm)
        id: resolve
        run: |
          source scripts/config.sh
          bash scripts/latest-patches.sh > latest.json
          bash scripts/targets-json.sh   > targets.json
          only="${{ inputs.only_minor }}"
          target="${{ inputs.only_target }}"
          force=""; [ "${{ inputs.force }}" = "true" ] && force="--force"
          onlyarg=""; [ -n "$only" ] && onlyarg="--only-minor=$only"
          targetarg=""; [ -n "$target" ] && targetarg="--only-target=$target"
          php scripts/resolve-builds.php \
            --old-manifest=old-manifest.json \
            --latest=latest.json --targets=targets.json \
            --minors="$SUPPORTED_MINORS" $onlyarg $targetarg $force > matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
          echo "count=$(jq '.include | length' matrix.json)" >> "$GITHUB_OUTPUT"
      - name: Upload resolve artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resolve-${{ inputs.channel }}
          path: |
            matrix.json
            old-manifest.json
            latest.json

  # ---------------------------------------------------------------------------
  build:
    needs: resolve
    if: needs.resolve.outputs.count > 0
    runs-on: ${{ matrix.runner }}
    env:
      CHANNEL: ${{ inputs.channel }}
    strategy:
      fail-fast: false          # one target failing must not abandon the rest
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP (tooling on host)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Build ${{ matrix.name }} (§4)
        env:
          # spc's --prefer-pre-built fetches dependency packages from the
          # static-php-cli-hosted releases via api.github.com; unauthenticated
          # CI shares IPs and hits the 60-req/hr limit (HTTP 403). spc reads
          # GITHUB_TOKEN (CurlHook::setupGithubToken) to authenticate.
          GITHUB_TOKEN: ${{ github.token }}
        run: bash scripts/build-target.sh "${{ matrix.minor }}" "${{ matrix.os }}"
      - name: Verify §5 gate
        env:
          GH_TOKEN: ${{ github.token }}     # for the cross-repo real-ext download
        run: |
          bash scripts/verify-artifact.sh \
            static-php-cli/buildroot/bin/php \
            static-php-cli/buildroot/bin/php-fpm \
            "${{ matrix.minor }}" "${{ matrix.os }}" "${{ matrix.arch }}"
      - name: Package the two single-member tarballs (§1)
        run: |
          mkdir -p dist
          bash scripts/package-artifacts.sh \
            "${{ matrix.php }}" "${{ matrix.revision }}" \
            "${{ matrix.os }}" "${{ matrix.arch }}" \
            static-php-cli/buildroot/bin dist
      # spc writes the real compiler/linker error to log/ (NOT the console — the
      # console only shows the failed command + exit code). Capture it on failure
      # so an extension that won't compile on an EOL PHP can actually be pinned
      # down and trimmed from LEGACY_EXTENSIONS.
      - name: Upload static-php-cli logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spc-logs-${{ inputs.channel }}-${{ matrix.name }}
          path: static-php-cli/log/
          if-no-files-found: warn
      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ inputs.channel }}-${{ matrix.name }}
          path: dist/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  publish:
    needs: [resolve, build]
    if: needs.resolve.outputs.count > 0 && needs.build.result == 'success'
    runs-on: ubuntu-latest
    env:
      CHANNEL: ${{ inputs.channel }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP (tooling)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign
      - name: Download resolve outputs
        uses: actions/download-artifact@v4
        with:
          name: resolve-${{ inputs.channel }}
          path: .
      - name: Download this channel's built tarballs into dist/
        uses: actions/download-artifact@v4
        with:
          pattern: dist-${{ inputs.channel }}-*
          path: dist
          merge-multiple: true
      - name: Generate ${{ inputs.channel }} manifest (§7)
        run: |
          source scripts/config.sh
          php scripts/generate-manifest.php \
            --built=matrix.json --assets-dir=dist \
            --minors="$SUPPORTED_MINORS" \
            --old-manifest=old-manifest.json > "$MANIFEST_NAME"
          echo "::group::$MANIFEST_NAME"; cat "$MANIFEST_NAME"; echo "::endgroup::"
      - name: Sign manifest (§6 — prehashed, dedicated key)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
          MINISIGN_PUBLIC_KEY: ${{ vars.MINISIGN_PUBLIC_KEY }}
        run: |
          source scripts/config.sh
          bash scripts/sign-manifest.sh "$MANIFEST_NAME" "$MANIFEST_SIG_NAME"
      - name: Publish — prune LAST (§6)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source scripts/config.sh
          bash scripts/publish.sh dist "$MANIFEST_NAME" "$MANIFEST_SIG_NAME"
      - name: Post-publish sanity (§10.8)
        env:
          GH_TOKEN: ${{ github.token }}
          MINISIGN_PUBLIC_KEY: ${{ vars.MINISIGN_PUBLIC_KEY }}
        run: bash scripts/sanity-check.sh
