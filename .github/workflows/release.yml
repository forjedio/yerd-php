name: build-and-release

# §9 cadence: scheduled (build newer upstream patches) + manual dispatch
# (rebuild a minor / channel — set force to bump the revision of an unchanged
# patch). The actual pipeline lives in the reusable release-channel.yml; this
# workflow just owns the triggers and drives it once per channel.
#
# Both channels publish into the SAME rolling release (tag `php`), so the legacy
# leg `needs` the stable leg — that serializes the shared-release prune step
# within a run, and the top-level concurrency group serializes across runs (§6).
on:
  schedule:
    - cron: "17 6 * * *"          # daily; offset from the top of the hour
  workflow_dispatch:
    inputs:
      channel:
        description: "Which channel(s) to run."
        required: false
        type: choice
        options: [both, stable, legacy]
        default: both
      only_minor:
        description: "Restrict to a single minor (e.g. 8.4, or 8.1 for legacy). Blank = all in the channel(s)."
        required: false
        type: string
      force:
        description: "Rebuild even if the patch is unchanged (bumps revision -N). Use for c-ares cutover / spc bump / security rebuild."
        required: false
        type: boolean
        default: false

# A reusable workflow's GITHUB_TOKEN permissions are CAPPED by the caller's, so
# the write grant must live here too — release-channel.yml also declares it, but
# a callee can only restrict, never elevate. Without this the callee's
# gh release upload/delete-asset would 403 if the repo default token is read-only.
permissions:
  contents: write               # create/update the rolling release + assets

# §9 — serialize releases so a scheduled run and a manual dispatch can't both
# run the 'read previous manifest -> +1' increment and collide on a revision /
# asset name. Never cancel an in-flight release.
concurrency:
  group: yerd-php-release
  cancel-in-progress: false

jobs:
  stable:
    # Scheduled runs always do both channels; dispatch honours the choice.
    if: ${{ github.event_name == 'schedule' || inputs.channel == 'both' || inputs.channel == 'stable' }}
    uses: ./.github/workflows/release-channel.yml
    with:
      channel: stable
      only_minor: ${{ inputs.only_minor || '' }}
      force: ${{ inputs.force || false }}
    secrets: inherit

  legacy:
    # `needs: stable` + `always()` sequences legacy AFTER stable when both run
    # (shared-release prune must not race), yet still runs legacy when stable is
    # skipped (dispatch with channel=legacy).
    needs: [stable]
    if: ${{ always() && (github.event_name == 'schedule' || inputs.channel == 'both' || inputs.channel == 'legacy') }}
    uses: ./.github/workflows/release-channel.yml
    with:
      channel: legacy
      only_minor: ${{ inputs.only_minor || '' }}
      force: ${{ inputs.force || false }}
    secrets: inherit
